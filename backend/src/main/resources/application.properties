spring.application.name=health-logger

server.port=8081
server.servlet.session.timeout=2592000s
server.servlet.session.cookie.max-age=2592000s
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

spring.datasource.url=jdbc:h2:file:./data/health-logger;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.auth.google-enabled=${GOOGLE_AUTH_ENABLED:false}
app.seed-sample-data=${SEED_SAMPLE_DATA:false}

debug=false
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
